<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Kyle's NewsHub</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="styles.css">

</head>

<body>

    <!-- ===============================
         Navigation
    ================================ -->

    <nav class="navbar navbar-dark shadow">

        <div class="container">

            <a
                href="#"
                class="navbar-brand fs-3 fw-bold">

                📰 Kyle's NewsHub

            </a>

        </div>

    </nav>

    <!-- ===============================
         Hero
    ================================ -->

    <header class="hero">

        <div class="container text-center text-white">

            <h1 class="display-4 fw-bold">

                Stay Informed

            </h1>

            <p class="lead">

                Breaking news from around the world.

            </p>

            <div class="row justify-content-center mt-4 g-3">

                <div class="col-lg-5">

                    <input
                        id="searchInput"
                        class="form-control form-control-lg"
                        placeholder="Search news...">

                </div>

                <div class="col-lg-2 d-grid">

                    <button
                        id="searchBtn"
                        class="btn btn-info btn-lg text-white">

                        <i class="bi bi-search"></i>

                        Search

                    </button>

                </div>

                <div class="col-lg-3">

                    <select
                        id="category"
                        class="form-select form-select-lg">

                        <option value="">Latest News</option>
                        <option value="business">Business</option>
                        <option value="technology">Technology</option>
                        <option value="sports">Sports</option>
                        <option value="science">Science</option>
                        <option value="health">Health</option>
                        <option value="politics">Politics</option>
                        <option value="world">World</option>
                        <option value="finance">Finance</option>
                        <option value="food">Food</option>
                        <option value="entertainment">Entertainment</option>

                    </select>

                </div>

                <div class="col-lg-2 d-grid">

                    <button
                        id="refreshBtn"
                        class="btn btn-outline-light btn-lg">

                        <i class="bi bi-arrow-clockwise"></i>

                        Refresh

                    </button>

                </div>

            </div>

        </div>

    </header>

    <!-- ===============================
         News Section
    ================================ -->

    <main class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">

                Latest Stories

            </h2>

            <span
                id="resultsCount"
                class="badge bg-info fs-6">

                0 Articles

            </span>

        </div>

        <!-- Loading Spinner -->

        <div
            id="loading"
            class="text-center my-5 d-none">

            <div class="spinner-border text-info"></div>

            <p class="mt-3">

                Loading news...

            </p>

        </div>

        <!-- Error -->

        <div
            id="errorMessage">

        </div>

        <!-- Articles -->

        <div
            id="news"
            class="row g-4">

        </div>

        <!-- Load More -->

        <div class="text-center mt-5">

            <button
                id="loadMoreBtn"
                class="btn btn-info btn-lg text-white">

                Load More Articles

            </button>

        </div>

    </main>

    <!-- Back to Top -->

    <button
        id="topBtn"
        class="btn btn-info rounded-circle shadow">

        ↑

    </button>

    <!-- Footer -->

    <footer class="text-center py-4 text-light">

        © 2026 Kyle's NewsHub

    </footer>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- App -->

    <script
        type="module"
        src="scripts.js"></script>

</body>

</html>
