<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle's NewsHub | Today's Headlines</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">
                📰 Kyle's NewsHub
            </a>
        </div>
    </nav>

    <!-- Hero Banner -->
    <header class="hero text-center text-white">

        <div class="container">

            <h1 class="display-4 fw-bold">
                Stay Informed.
            </h1>

            <p class="lead">
                Breaking news from around the world in one beautiful place.
            </p>

            <!-- Search Section -->
            <div class="row justify-content-center mt-5 g-3">

                <div class="col-lg-5">
                    <input
                        id="searchInput"
                        class="form-control form-control-lg"
                        type="text"
                        placeholder="🔍 Search news...">
                </div>

                <div class="col-lg-2 d-grid">
                    <button
                        id="searchBtn"
                        class="btn btn-info btn-lg text-white">
                        Search
                    </button>
                </div>

                <div class="col-lg-3">
                    <select
                        id="category"
                        class="form-select form-select-lg">

                        <option value="">Top Headlines</option>
                        <option value="business">Business</option>
                        <option value="technology">Technology</option>
                        <option value="science">Science</option>
                        <option value="sports">Sports</option>
                        <option value="health">Health</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="general">General</option>

                    </select>
                </div>

            </div>

        </div>

    </header>

    <!-- News Section -->
    <section class="container my-5">

        <div class="row">

            <div class="col">

                <h2 class="section-title mb-4">
                    Latest Stories
                </h2>

            </div>

        </div>

        <div
            id="news"
            class="row g-4">

        </div>

    </section>

    <!-- Pagination -->
    <section class="container mb-5">

        <div class="d-flex justify-content-center gap-3">

            <button
                id="prevBtn"
                class="btn btn-outline-info btn-lg">
                ← Previous
            </button>

            <button
                id="nextBtn"
                class="btn btn-info btn-lg text-white">
                Next →
            </button>

        </div>

    </section>

    <!-- Footer -->
    <footer class="text-center text-light py-4">

        <p class="mb-0">
            © Kyle's  NewsHub • Powered by Kyle Josephs
        </p>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="scripts.js" type="module"></script>

</body>
</html>
